name: Deploy Website to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend into Server Public
        run: |
          npm install
          cd server && npm install
          cd ..
          npm run build -- --outDir server/public
          # Remove local node_modules before upload to avoid cross-platform issues
          # and to speed up SCP. We will reinstall on the server.
          rm -rf server/node_modules
          rm -rf node_modules

      - name: Prepare Hostinger Folder (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.25.83.161
          username: u549028972
          password: Vrushali@123456789
          port: 65002
          script: |
            mkdir -p domains/jannathandloom.com/public_html
            # Clean root folder safely (preserve uploads + public_html)
            cd domains/jannathandloom.com
            ls -A | grep -vE '^(uploads|public_html)$' | xargs rm -rf 2>/dev/null || true
            
            # Clean public_html folder safely (preserve uploads)
            cd public_html
            ls -A | grep -vE '^(uploads)$' | xargs rm -rf 2>/dev/null || true

      - name: Deploy Unified App to Hostinger (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 82.25.83.161
          username: u549028972
          password: Vrushali@123456789
          port: 65002
          source: "server/*"
          target: "domains/jannathandloom.com/public_html/"
          strip_components: 1

      - name: Prepare Root for Hostinger (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.25.83.161
          username: u549028972
          password: Vrushali@123456789
          port: 65002
          script: |
            # Hostinger ROOT setting is ./ so we MUST have package.json there
            cd domains/jannathandloom.com
            cp public_html/package.json .
            cp public_html/package-lock.json .
            npm install --production
            # We also install in public_html just in case the pathing is weird
            cd public_html
            npm install --production
            # Restart
            mkdir -p tmp
            touch tmp/restart.txt


