name: Deploy Website to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Prepare Hostinger Folders (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.25.83.161
          username: u549028972
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          script: |
            mkdir -p domains/jannathandloom.com/public_html
            mkdir -p domains/jannathandloom.com/nodejs
            # Clean old frontend files
            find domains/jannathandloom.com/public_html/ -mindepth 1 ! -name '.htaccess' -delete

      - name: Deploy Frontend to Hostinger (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 82.25.83.161
          username: u549028972
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          source: "dist/*"
          target: "domains/jannathandloom.com/public_html/"
          strip_components: 1

      - name: Deploy Backend to Hostinger (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 82.25.83.161
          username: u549028972
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          source: "server/*"
          target: "domains/jannathandloom.com/nodejs/"
          strip_components: 1

      - name: Install Backend Dependencies & Restart Node.js
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.25.83.161
          username: u549028972
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          script: |
            cd domains/jannathandloom.com/nodejs
            npm install --production
            # Touch restart file for Node.js apps
            mkdir -p tmp
            touch tmp/restart.txt
