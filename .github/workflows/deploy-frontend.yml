name: Deploy Website to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend into Server Public
        run: |
          npm install
          cd server && npm install
          cd ..
          npm run build -- --outDir server/public
          # Remove local node_modules before upload to avoid cross-platform issues
          # and to speed up SCP. We will reinstall on the server.
          rm -rf server/node_modules
          rm -rf node_modules

      - name: Prepare Hostinger Folder (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.25.83.161
          username: u549028972
          password: Vrushali@123456789
          port: 65002
          script: |
            mkdir -p domains/jannathandloom.com/public_html
            # Clean old files to ensure a fresh deployment
            # We preserve the uploads folder to keep product images!
            # We deploy everything to public_html which is the standard web folder.
            find domains/jannathandloom.com/public_html/ -maxdepth 1 -not -name 'uploads' -not -name '.' -not -name '..' -exec rm -rf {} +

      - name: Deploy Unified App to Hostinger (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 82.25.83.161
          username: u549028972
          password: Vrushali@123456789
          port: 65002
          source: "server/*"
          target: "domains/jannathandloom.com/public_html/"
          strip_components: 1

      - name: Install Final Dependencies & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.25.83.161
          username: u549028972
          password: Vrushali@123456789
          port: 65002
          script: |
            cd domains/jannathandloom.com/public_html
            npm install --production
            # Ensure the uploads directory exists
            mkdir -p uploads
            # Restart mechanism
            mkdir -p tmp
            touch tmp/restart.txt
